<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up | BreastCancerAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #9b87f5;
            --primary-dark: #7c6be0;
            --primary-light: #b8a9ff;
            --secondary: #f4a261;
            --success: #2a9d8f;
            --danger: #e76f51;
            --dark: #2b2d42;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
        }
        .signup-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .signup-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 40px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .signup-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .signup-header p {
            color: #6c757d;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }
        .form-control {
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }
        .form-control:focus {
            background-color: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(155, 135, 245, 0.1);
            outline: none;
        }
        .btn-signup {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            margin-top: 10px;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(155, 135, 245, 0.3);
        }
        .btn-signup:active {
            transform: translateY(0);
        }
        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            padding: 12px 16px;
            font-size: 13px;
        }
        .alert-danger {
            background-color: #fee;
            color: #c33;
            border-left: 4px solid var(--danger);
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .login-link p {
            font-size: 14px;
            color: #6c757d;
        }
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .login-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        .icon-input {
            position: relative;
        }
        .icon-input i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
            pointer-events: none;
        }
        .icon-input input {
            padding-left: 40px !important;
        }
        .password-requirements {
            font-size: 12px;
            color: #6c757d;
            margin-top: 6px;
            padding: 8px 12px;
            background-color: #f9fafb;
            border-radius: 6px;
        }
        .requirement {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .requirement i {
            margin-right: 6px;
            width: 16px;
            text-align: center;
        }
        .requirement.met i {
            color: var(--success);
        }
        .requirement.unmet i {
            color: #d0d5dd;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h1><i class="fas fa-microscope"></i> BreastCancerAI</h1>
                <p>Create Your Account</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('signup') }}" id="signupForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="icon-input">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="Choose a username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="icon-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Create a strong password" required oninput="checkPassword()">
                    </div>
                    <div class="password-requirements">
                        <div class="requirement" id="req-length">
                            <i class="fas fa-circle"></i>
                            <span>At least 6 characters</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="icon-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                               placeholder="Re-enter your password" required oninput="checkPassword()">
                    </div>
                    <div class="password-requirements">
                        <div class="requirement" id="req-match">
                            <i class="fas fa-circle"></i>
                            <span>Passwords match</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-signup" id="submitBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function checkPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const lengthReq = document.getElementById('req-length');
            const matchReq = document.getElementById('req-match');

            // Check length requirement
            if (password.length >= 6) {
                lengthReq.classList.add('met');
                lengthReq.classList.remove('unmet');
            } else {
                lengthReq.classList.remove('met');
                lengthReq.classList.add('unmet');
            }

            // Check password match requirement
            if (password && confirmPassword && password === confirmPassword) {
                matchReq.classList.add('met');
                matchReq.classList.remove('unmet');
            } else {
                matchReq.classList.remove('met');
                matchReq.classList.add('unmet');
            }
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters long.');
                return;
            }

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match.');
                return;
            }
        });
    </script>
</body>
</html>
